<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塾生マイページ | 鉄緑会 医進会</title>
    <style>
        /* 全体のリセットと基本スタイル */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --------------------------------------
         * ログイン画面のスタイル
         * -------------------------------------- */
        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #0d233a;
            margin-bottom: 5px;
            letter-spacing: 0.1em;
        }

        .login-subtitle {
            color: #c5a059;
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #4a5568;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #0d233a;
        }

        .login-btn {
            width: 100%;
            background-color: #0d233a;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background-color: #1a3a5c;
        }

        .error-message {
            color: #e53e3e;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        /* --------------------------------------
         * マイページ（ログイン後）のレイアウト
         * -------------------------------------- */
        .mypage-container {
            display: none;
            width: 100%;
            min-height: 100vh;
            position: relative;
        }

        /* 上部固定のナビゲーションバー */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #0d233a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .fixed-logo {
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        .fixed-logo span {
            color: #c5a059;
            font-size: 0.8rem;
            margin-left: 10px;
            font-weight: normal;
        }

        .menu-toggle {
            background: #1a3a5c;
            color: white;
            border: 1px solid #2c5282;
            border-radius: 4px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .menu-toggle:hover {
            background: #2b527a;
        }
